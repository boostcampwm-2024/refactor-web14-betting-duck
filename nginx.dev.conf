worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 업스트림 서버 정의
    upstream backend_servers {
        # 백엔드 서버 목록 (로드 밸런싱 대상 서버)
        server betting_duck_app_dev:3000;
    }

    server {
        listen 80;
        server_name bettingduck.site www.bettingduck.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name bettingduck.site www.bettingduck.site;

        # Certbot이 발급한 SSL 인증서 적용
        ssl_certificate /etc/letsencrypt/live/bettingduck.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bettingduck.site/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 일반 API 요청 처리
        location /api {
            proxy_pass http://backend_servers/api; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.IO 요청 처리
        location /socket.io/ {
            proxy_pass https://backend_servers/socket.io/; 
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 시간 초과 설정
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 버퍼 크기 설정
            proxy_buffering off;
        }

        # 정적 파일 경로 설정
        location / {
            root /static/;
            index index.html;
            autoindex off;
            try_files $uri /index.html;
        }
    }
}